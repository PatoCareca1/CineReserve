version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cinereserve_db
      POSTGRES_USER: cinereserve_user
      POSTGRES_PASSWORD: cinereserve_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_NAME=cinereserve_db
      - DB_USER=cinereserve_user
      - DB_PASSWORD=cinereserve_password
      - REDIS_URL=redis://redis:6379/0
  celery:
    build: .
    command: celery -A core worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_NAME=cinereserve_db
      - DB_USER=cinereserve_user
      - DB_PASSWORD=cinereserve_password
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
